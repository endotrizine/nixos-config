# ~/.config/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = "catppuccin_mocha"   # ← переключай тут: catppuccin_mocha / catppuccin_macchiato / catppuccin_frappe / catppuccin_latte / ii
command_timeout = 1000
scan_timeout = 30

format = """
$os\
$directory\
$git_branch\
$git_status\
$git_state\
$fill\
$nodejs$python$rust$golang$lua$java$ruby$nix_shell\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

[fill]
symbol = " "

# ─── Character ───────────────────────────────────────────
[character]
success_symbol = "[❯](bold fg:accent)"
error_symbol   = "[❯](bold fg:error)"
vimcmd_symbol  = "[❮](bold fg:success)"

# ─── OS ──────────────────────────────────────────────────
[os]
disabled = false
format = "[$symbol](fg:muted) "

[os.symbols]
Arch     = "󰣇"
NixOS    = "󱄅"
Ubuntu   = ""
Debian   = ""
Fedora   = ""
Macos    = ""
Linux    = ""
Manjaro  = ""
Mint     = "󰣭"
Windows  = "󰍲"

# ─── Directory ───────────────────────────────────────────
[directory]
style = "bold fg:info"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "fg:error"
format = "[$path]($style)[$read_only]($read_only_style)"
home_symbol = "~"

# ─── Git ─────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "fg:accent"
format = "  [$symbol$branch]($style)"

[git_status]
style = "fg:warning"
format = "[ $all_status$ahead_behind]($style)"
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked  = "?${count}"
stashed    = "*${count}"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "fg:warning"

# ─── Languages ───────────────────────────────────────────
[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "fg:success"

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version})( \($virtualenv\) )]($style)'
style = "fg:warning"

[rust]
symbol = "󱘗 "
format = "[$symbol($version )]($style)"
style = "fg:error"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "fg:info"

[lua]
symbol = " "
format = "[$symbol($version )]($style)"
style = "fg:info"

[java]
symbol = " "
format = "[${symbol}(${version} )]($style)"
style = "fg:error"

[ruby]
symbol = " "
format = "[$symbol($version )]($style)"
style = "fg:error"

[nix_shell]
symbol = "󱄅 "
format = '[$symbol$state( \($name\) )]($style)'
style = "fg:info"

# ─── Cmd duration ────────────────────────────────────────
[cmd_duration]
min_time = 2000
format = "[ 󰔛 $duration]($style)"
style = "fg:muted italic"

# ─── Right side ──────────────────────────────────────────
[time]
disabled = false
time_format = "%H:%M"
format = "[$time]($style)"
style = "fg:muted"

# ─── Quiet by default ────────────────────────────────────
[package]
disabled = true
[memory_usage]
disabled = true
[battery]
disabled = true
[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "fg:muted"
[username]
show_always = false
format = "[$user]($style) "
style = "fg:muted"
[line_break]
disabled = false

